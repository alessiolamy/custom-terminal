name: Deploy Bloomberg Terminal

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Check syntax
        run: |
          python -m py_compile app.py
          python -m py_compile utils/data.py
          python -m py_compile pages/market_data.py
          python -m py_compile pages/news_feed.py
          python -m py_compile pages/earnings.py
          python -m py_compile pages/options.py
          python -m py_compile pages/portfolio.py
          echo "✓ All files pass syntax check"

      # Streamlit Cloud auto-deploys from the main branch.
      # No extra deploy step needed — just push to main.
      # Secrets are managed in the Streamlit Cloud dashboard.
